<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Procesos Diarios</title>
	<link rel="stylesheet" href="assets/css/estilos.css">
	
    <!-- Librerías -->
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link  href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css" rel="stylesheet">
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

</head>
<body>

<div class="header">
    <div class="header-left">
        <h2>📊 Dashboard de Procesos Ejecutados</h2>
        <div id="fechaActualizacion" class="fecha"></div>
    </div>

    <div class="header-right">
        <img src="assets/img/Infra-BD.jpg" alt="Logo Infra BD" class="logo">
    </div>
</div>

<div class="kpi-container">
    <div class="kpi-card" id="totalProcesos"></div>
    <div class="kpi-card error" id="procesosError"></div>
    <div class="kpi-card" id="tiempoMinimo"></div>
    <div class="kpi-card" id="tiempoMaximo"></div>
</div>

<div id="charts">
    <div id="chartEstados"></div>
    <div id="chartServidores"></div>

    <div id="chartTopDuracion"></div>
    <div id="chartBaseDatos"></div>
</div>

<h3>📋 Detalle de Procesos</h3>
<table id="tablaProcesos" class="display"></table>

<script src="assets/js/dashboard.js"></script>

</body>
</html>
