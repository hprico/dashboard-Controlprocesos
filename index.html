<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Procesos Diarios</title>

    <!-- Librerías -->
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link  href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css" rel="stylesheet">
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

    <style>
        body { font-family: Arial; margin: 20px; }
        .kpi { display: inline-block; margin-right: 30px; font-size: 18px; }
        #charts { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    </style>
</head>
<body>

<h2>📊 Dashboard de Control Procesos</h2>

<div class="kpi" id="totalProcesos"></div>
<div class="kpi" id="procesosError"></div>
<div class="kpi" id="duracionPromedio"></div>

<div id="charts">
    <div id="chartEstados"></div>
    <div id="chartServidores"></div>
    <div id="chartTopDuracion"></div>
</div>

<h3>📋 Detalle de Procesos</h3>
<table id="tablaProcesos" class="display"></table>

<script src="assets/js/dashboard.js"></script>

</body>
</html>
